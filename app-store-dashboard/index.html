<!-- Header -->

<div class="max-w-7xl mx-auto px-6 pt-4">

      <div id="topLiked" class="space-y-2"></div>

</div>

<div id="panel-apps" class="max-w-7xl mx-auto px-6 py-6 hidden">

      <option value="official">官方</option>
      <option value="community">社区</option>

  '📚 教育儿童': ['education','kids'],
  '⏰ 生产力': ['productivity','pomodoro','focus','fitness','wellness'],
  '🔧 开发工具': ['debug','ci','testing','dashboard','docker','gradio','fastapi','websocket'],
  '🎭 表情个性': ['emotion','expressive-robot'],
};

function getCategory(app) {
  for (const [cat, tags] of Object.entries(categoryMap)) {
    if (app.tags.some(t => tags.includes(t))) return cat;
  }
  return '📦 其他';
}

function timeAgo(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  const now = new Date('2026-05-13');
  const days = Math.floor((now - d) / 86400000);
  if (days < 1) return '今天';
  if (days < 7) return `${days}天前`;
  if (days < 30) return `${Math.floor(days/7)}周前`;
  if (days < 365) return `${Math.floor(days/30)}月前`;
  return `${Math.floor(days/365)}年前`;
}

// ==================== INIT ====================
function init() {
  const apps = APPS_DATA;

  // Stats
  const official = apps.filter(a => a.isOfficial);
  const community = apps.filter(a => !a.isOfficial);
  const authors = new Set(apps.map(a => a.author).filter(Boolean));
  const quality = apps.filter(a => a.likes >= 5 && a.description && a.description !== 'Write your description here');

  document.getElementById('stat-total').textContent = apps.length;
  document.getElementById('stat-official').textContent = official.length;
  document.getElementById('stat-community').textContent = community.length;
  document.getElementById('stat-likes').textContent = apps.reduce((s,a) => s + a.likes, 0).toLocaleString();
  document.getElementById('stat-authors').textContent = authors.size;
  document.getElementById('stat-quality').textContent = quality.length;

  renderCharts(apps);
  renderTopLists(apps);
  renderTagCloud(apps);
  applyFilters();
  renderTrends(apps);
  renderInsights(apps);

  document.getElementById('searchInput').addEventListener('input', () => applyFilters());
}

// ==================== CHARTS ====================
function renderCharts(apps) {
  // Monthly
  const monthly = {};
  apps.forEach(a => {
    if (a.createdAt) {
      const m = a.createdAt.slice(0,7);
      monthly[m] = (monthly[m]||0) + 1;
    }
  });
  const mLabels = Object.keys(monthly).sort();
  new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: { labels: mLabels, datasets: [{ data: mLabels.map(m => monthly[m]), backgroundColor: 'rgba(99,102,241,0.6)', borderRadius: 6, borderSkipped: false }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 11 } } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } } } }
  });

  // Likes distribution
  const brackets = [[0,0],[1,5],[6,10],[11,20],[21,50],[51,100],[101,400]];
  const bLabels = brackets.map(([l,h]) => l===h?`${l}`:`${l}-${h}`);
  const bData = brackets.map(([l,h]) => apps.filter(a => a.likes>=l && a.likes<=h).length);
  new Chart(document.getElementById('chartLikes'), {
    type: 'bar',
    data: { labels: bLabels, datasets: [{ data: bData, backgroundColor: ['#334155','#6366f1','#818cf8','#a78bfa','#c084fc','#e879f9','#f472b6'], borderRadius: 6, borderSkipped: false }] },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }, y: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
  });

  // Category donut
  const catCounts = {};
  apps.forEach(a => { const c = getCategory(a); catCounts[c] = (catCounts[c]||0)+1; });
  const catLabels = Object.keys(catCounts).sort((a,b) => catCounts[b]-catCounts[a]);
  const catColors = ['#6366f1','#818cf8','#a78bfa','#c084fc','#e879f9','#f472b6','#fb7185','#fbbf24','#34d399','#60a5fa','#94a3b8'];
  new Chart(document.getElementById('chartCategory'), {
    type: 'doughnut',
    data: { labels: catLabels, datasets: [{ data: catLabels.map(c => catCounts[c]), backgroundColor: catColors, borderWidth: 0 }] },
    options: { responsive: true, cutout: '55%', plugins: { legend: { position: 'right', labels: { color: '#94a3b8', font: { size: 11 }, padding: 8, usePointStyle: true, pointStyleWidth: 8 } } } }
  });
}

function renderTopLists(apps) {

  const authorCounts = {};

  const topA = Object.entries(authorCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxA = topA[0][1];
  document.getElementById('topAuthors').innerHTML = topA.map(([name,count],i) => `
    <div class="flex items-center gap-3">
      <span class="text-xs text-slate-500 w-4">${i+1}</span>
      <div class="flex-1">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm text-slate-300 truncate">${name}</span>
          <span class="text-xs text-indigo-400 font-medium">${count}</span>
        </div>
        <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full bar-animate" style="width:${count/maxA*100}%"></div>
        </div>
      </div>
    </div>
  `).join('');

  // Top liked
  const topL = [...apps].sort((a,b)=>b.likes-a.likes).slice(0,10);
  const maxL = topL[0].likes || 1;
  document.getElementById('topLiked').innerHTML = topL.map((a,i) => `
    <div class="flex items-center gap-3 app-row rounded-lg p-1.5 -mx-1.5 cursor-pointer" onclick="window.open('${a.url}','_blank')">
      <span class="text-xs text-slate-500 w-4">${i+1}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm text-slate-300 truncate">${a.emoji||'📱'} ${a.name}</span>
          <span class="text-xs text-pink-400 font-medium">${a.likes}❤️</span>
        </div>
        <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-pink-500 to-rose-500 rounded-full bar-animate" style="width:${a.likes/maxL*100}%"></div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderTagCloud(apps) {
  const tagCounts = {};
  apps.forEach(a => a.tags.forEach(t => {
    if (!['static','region:us','reachy_mini','reachy_mini_python_app','reachy_mini_js_app'].includes(t))
      tagCounts[t] = (tagCounts[t]||0)+1;
  }));
  const maxC = Math.max(...Object.values(tagCounts));
  const cloud = document.getElementById('tagCloud');
  cloud.innerHTML = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).map(([tag,count]) => {
    const size = 0.65 + (count/maxC)*0.6;
    const opacity = 0.3 + (count/maxC)*0.7;
    return `<span class="tag px-3 py-1 rounded-full border border-white/10 text-xs" style="font-size:${size}rem;opacity:${opacity}" onclick="filterByTag('${tag}')">${tag} <span class="text-slate-500">${count}</span></span>`;
  }).join('');
}

// ==================== APP LIST ====================
function applyFilters() {
  const type = document.getElementById('filterType').value;
  const sort = document.getElementById('filterSort').value;
  const lang = document.getElementById('filterLang').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = [...APPS_DATA];
  if (type === 'official') filtered = filtered.filter(a => a.isOfficial);
  if (type === 'community') filtered = filtered.filter(a => !a.isOfficial);
  if (lang === 'python') filtered = filtered.filter(a => a.isPythonApp);
  if (lang === 'js') filtered = filtered.filter(a => a.tags.includes('reachy_mini_js_app'));
  if (search) filtered = filtered.filter(a => a.name.toLowerCase().includes(search) || (a.description||'').toLowerCase().includes(search) || (a.author||'').toLowerCase().includes(search));

  if (sort === 'likes') filtered.sort((a,b) => b.likes - a.likes);
  else if (sort === 'newest') filtered.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  else if (sort === 'updated') filtered.sort((a,b) => (b.lastModified||'').localeCompare(a.lastModified||''));
  else if (sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('filterCount').textContent = `显示 ${filtered.length} / ${APPS_DATA.length} 个应用`;

  const list = document.getElementById('appList');
  list.innerHTML = filtered.slice(0, 100).map(a => `
    <div class="app-row glass rounded-xl p-4 flex items-center gap-4 cursor-pointer" onclick="window.open('${a.url}','_blank')">
      <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center text-lg flex-shrink-0">${a.emoji||'📱'}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium text-white truncate">${a.name}</span>
          ${a.isOfficial ? '<span class="px-1.5 py-0.5 rounded text-[10px] bg-indigo-500/20 text-indigo-300 border border-indigo-500/30">官方</span>' : ''}
          <span class="px-1.5 py-0.5 rounded text-[10px] bg-white/5 text-slate-400">${a.isPythonApp ? 'Python' : 'JS'}</span>
        </div>
        <div class="text-xs text-slate-400 truncate mt-0.5">${a.description || '暂无描述'}</div>
        <div class="flex items-center gap-3 mt-1">
          <span class="text-[10px] text-slate-500">by ${a.author || '-'}</span>
          <span class="text-[10px] text-slate-500">${getCategory(a)}</span>
        </div>
      </div>
      <div class="text-right flex-shrink-0">
        <div class="text-sm font-semibold text-pink-400">${a.likes}❤️</div>
        <div class="text-[10px] text-slate-500">${timeAgo(a.lastModified)}</div>
      </div>
    </div>
  `).join('');
}

function filterByTag(tag) {
  switchTab('apps');
  document.getElementById('searchInput').value = tag;
  applyFilters();
}

// ==================== TRENDS ====================
function renderTrends(apps) {
  // Daily (last 90 days)
  const daily = {};
  const cutoff = new Date('2026-02-13');
  apps.forEach(a => {
    if (a.createdAt) {
      const d = new Date(a.createdAt);
      if (d >= cutoff) {
        const key = a.createdAt.slice(0,10);
        daily[key] = (daily[key]||0)+1;
      }
    }
  });
  const dLabels = Object.keys(daily).sort();
  new Chart(document.getElementById('chartDaily'), {
    type: 'line',
    data: { labels: dLabels, datasets: [{ data: dLabels.map(d => daily[d]), borderColor: '#818cf8', backgroundColor: 'rgba(99,102,241,0.1)', fill: true, tension: 0.4, pointRadius: 2 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 45 } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } } } }
  });

  // Author activity distribution
  const authorCounts = {};
  apps.forEach(a => { if(a.author) authorCounts[a.author] = (authorCounts[a.author]||0)+1; });
  const authorDist = [0,0,0,0,0]; // 1, 2, 3-5, 6-10, 10+
  Object.values(authorCounts).forEach(c => {
    if (c===1) authorDist[0]++;
    else if (c===2) authorDist[1]++;
    else if (c<=5) authorDist[2]++;
    else if (c<=10) authorDist[3]++;
    else authorDist[4]++;
  });
  new Chart(document.getElementById('chartAuthors'), {
    type: 'bar',
    data: { labels: ['1个应用','2个应用','3-5个','6-10个','10+个'], datasets: [{ data: authorDist, backgroundColor: ['#334155','#6366f1','#818cf8','#a78bfa','#c084fc'], borderRadius: 6, borderSkipped: false }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#94a3b8' } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } } } }
  });

  // Tag co-occurrence heatmap
  const topTags = Object.entries((() => { const tc = {}; apps.forEach(a => a.tags.forEach(t => { if(!['static','region:us','reachy_mini','reachy_mini_python_app','reachy_mini_js_app'].includes(t)) tc[t]=(tc[t]||0)+1; })); return tc; })()).sort((a,b)=>b[1]-a[1]).slice(0,15).map(t=>t[0]);
  const coOccur = {};
  topTags.forEach(t1 => { topTags.forEach(t2 => { coOccur[`${t1}|${t2}`] = 0; }); });
  apps.forEach(a => {
    const at = a.tags.filter(t => topTags.includes(t));
    for (let i=0;i<at.length;i++) for (let j=i;j<at.length;j++) { coOccur[`${at[i]}|${at[j]}`]++; coOccur[`${at[j]}|${at[i]}`]++; }
  });
  const maxCo = Math.max(...Object.values(coOccur)) || 1;
  let hmHTML = '<table class="text-[10px]"><thead><tr><th class="p-1 text-slate-500"></th>';
  topTags.forEach(t => { hmHTML += `<th class="p-1 text-slate-500 -rotate-45" style="writing-mode:vertical-rl;max-width:20px">${t.slice(0,8)}</th>`; });
  hmHTML += '</tr></thead><tbody>';
  topTags.forEach(t1 => {
    hmHTML += `<tr><td class="p-1 text-slate-500 text-right whitespace-nowrap">${t1.slice(0,10)}</td>`;
    topTags.forEach(t2 => {
      const v = coOccur[`${t1}|${t2}`] || 0;
      const intensity = v / maxCo;
      const bg = v > 0 ? `rgba(99,102,241,${0.1 + intensity*0.8})` : 'rgba(255,255,255,0.02)';
      hmHTML += `<td class="p-1 text-center" style="background:${bg};min-width:24px">${v||''}</td>`;
    });
    hmHTML += '</tr>';
  });
  hmHTML += '</tbody></table>';
  document.getElementById('tagHeatmap').innerHTML = hmHTML;

  // Official vs Community
  const offApps = apps.filter(a => a.isOfficial);
  const comApps = apps.filter(a => !a.isOfficial);
  new Chart(document.getElementById('chartOfficialVsCommunity'), {
    type: 'bar',
    data: {
      labels: ['应用数量', '总点赞', '平均点赞', '有描述'],
      datasets: [
        { label: '官方', data: [offApps.length, offApps.reduce((s,a)=>s+a.likes,0), (offApps.reduce((s,a)=>s+a.likes,0)/offApps.length).toFixed(1), offApps.filter(a=>a.description&&a.description!=='Write your description here').length], backgroundColor: 'rgba(99,102,241,0.7)', borderRadius: 6 },
        { label: '社区', data: [comApps.length, comApps.reduce((s,a)=>s+a.likes,0), (comApps.reduce((s,a)=>s+a.likes,0)/comApps.length).toFixed(1), comApps.filter(a=>a.description&&a.description!=='Write your description here').length], backgroundColor: 'rgba(168,85,247,0.7)', borderRadius: 6 }
      ]
    },
    options: { responsive: true, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { grid: { display: false }, ticks: { color: '#94a3b8' } }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } } } }
  });
}

function renderInsights(apps) {
  const noDesc = apps.filter(a => !a.description || a.description === 'Write your description here');
  const stale = apps.filter(a => {
    if (!a.lastModified) return false;
    const days = (new Date('2026-05-13') - new Date(a.lastModified)) / 86400000;
    return days > 60;
  });
  const quality = apps.filter(a => a.likes >= 5 && a.description && a.description !== 'Write your description here');
  const zeroLikes = apps.filter(a => a.likes === 0);
  const topApp = [...apps].sort((a,b) => b.likes - a.likes)[0];

  const insights = [
    { title: '🚀 生态高速增长', color: 'from-indigo-500 to-blue-500', body: `2026年5月已有 <b>52个</b> 新应用发布，创历史新高。从2025年10月的4个到现在的233个，<b>7个月增长58倍</b>。12月（45个）和5月（52个）是两个爆发点。` },
    { title: '⭐ 头部效应显著', color: 'from-pink-500 to-rose-500', body: `Top 5 应用占据 <b>${apps.slice(0,5).reduce((s,a)=>s+a.likes,0)}</b> 总赞中的大部分。<b>${topApp.name}</b> 以 ${topApp.likes} 赞遥遥领先。但 <b>${zeroLikes.length}</b> 个应用（${(zeroLikes.length/apps.length*100).toFixed(0)}%）零赞。` },
    { title: '📝 内容质量待提升', color: 'from-amber-500 to-orange-500', body: `<b>${noDesc.length}</b> 个应用（${(noDesc.length/apps.length*100).toFixed(0)}%）缺少有效描述。高质量应用（≥5赞且有描述）仅 <b>${quality.length}</b> 个（${(quality.length/apps.length*100).toFixed(0)}%）。` },
    { title: '💤 半数应用停止维护', color: 'from-slate-500 to-gray-500', body: `<b>${stale.length}</b> 个应用（${(stale.length/apps.length*100).toFixed(0)}%）超过60天未更新。社区应用的长期维护率较低。` },
    { title: '🎤 语音是最热方向', color: 'from-emerald-500 to-teal-500', body: `语音助手类应用有 <b>10个</b>，总赞 52。结合 AI代理（10个）和对话AI（3个），<b>语音+AI</b> 是社区最活跃的方向。` },
    { title: '👤 社区高度分散', color: 'from-purple-500 to-violet-500', body: `<b>${new Set(apps.map(a=>a.author).filter(Boolean)).size}</b> 个独立作者贡献了 ${apps.length} 个应用。最活跃作者 <b>RemiFabre</b> 贡献了12个应用。多数作者只发布1-2个。` },
    { title: '🔧 开发工具获赞最多', color: 'from-cyan-500 to-blue-500', body: `开发工具类（debug、dashboard、docker等）虽然只有14个应用，但总赞高达 <b>194</b>，说明开发者社区对基础设施需求强烈。` },
    { title: '🌍 中国生态机会', color: 'from-red-500 to-yellow-500', body: `目前仅1个繁体中文应用（台湾），<b>简体中文应用为零</b>。但 HuggingFace 在中国有镜像（hf-mirror.com），且文档提到 VPN 方案。中文本地化是巨大空白。` },
  ];

  document.getElementById('insightsContent').innerHTML = insights.map(i => `
    <div class="glass rounded-xl p-6 fade-in">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-1 h-8 rounded-full bg-gradient-to-b ${i.color}"></div>
        <h3 class="text-sm font-semibold text-white">${i.title}</h3>
      </div>
      <p class="text-sm text-slate-300 leading-relaxed">${i.body}</p>
    </div>
  `).join('');
}

// ==================== TAB SWITCH ====================
function switchTab(tab) {
  document.querySelectorAll('[id^="panel-"]').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('tab-active'));
  document.getElementById(`panel-${tab}`).classList.remove('hidden');
  document.getElementById(`tab-${tab}`).classList.add('tab-active');
}

// ==================== BOOT ====================
document.addEventListener('DOMContentLoaded', init);
</script>
