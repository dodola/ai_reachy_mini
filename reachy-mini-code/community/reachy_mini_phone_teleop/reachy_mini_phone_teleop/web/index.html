<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Reachy Mini Teleop</title>
	<script src="/assets/teleop-ui.js"></script>
	<style>
		:root {
			color-scheme: dark;
			--bg: #04080d;
			--panel: rgba(19, 27, 36, 0.9);
			--border: rgba(255, 255, 255, 0.06);
			--text: #e7f1ff;
			--muted: #9cb3c9;
			--accent: #46e9b4;
			--danger: #ff6b6b;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: radial-gradient(circle at 20% 20%, rgba(70, 233, 180, 0.1), transparent 26%),
				radial-gradient(circle at 80% 0%, rgba(83, 166, 255, 0.14), transparent 24%),
				linear-gradient(145deg, #050a11, #08111c 55%, #050a11);
			color: var(--text);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 18px;
		}

		main {
			width: min(440px, 100%);
			display: flex;
			flex-direction: column;
			gap: 14px;
		}

		.card {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 18px;
			padding: 18px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
			backdrop-filter: blur(8px);
		}

		.top-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
		}

		.brand {
			font-weight: 700;
			letter-spacing: -0.01em;
		}

		.status {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.04);
			border: 1px solid var(--border);
			font-weight: 600;
		}

		.status-dot {
			width: 12px;
			height: 12px;
			border-radius: 999px;
			background: var(--muted);
			box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.02);
		}

		.status-dot.connected {
			background: var(--accent);
			box-shadow: 0 0 0 6px rgba(70, 233, 180, 0.12);
		}

		.status-dot.disconnected {
			background: var(--danger);
			box-shadow: 0 0 0 6px rgba(255, 107, 107, 0.14);
		}

		.status-text {
			color: var(--muted);
			font-size: 0.95rem;
		}

		.title {
			font-size: 1.6rem;
			margin: 8px 0 4px;
			letter-spacing: -0.01em;
		}

		.subtitle {
			color: var(--muted);
			font-size: 0.98rem;
			line-height: 1.5;
		}

		.start-button {
			width: 100%;
			margin-top: 14px;
			background: linear-gradient(120deg, var(--accent), #5dbdff);
			color: #04101b;
			border: none;
			border-radius: 14px;
			padding: 14px 16px;
			font-weight: 800;
			font-size: 1rem;
			cursor: pointer;
			transition: transform 0.15s ease, box-shadow 0.2s ease;
			box-shadow: 0 16px 34px rgba(70, 233, 180, 0.25);
		}

		.start-button:active {
			transform: translateY(1px);
		}

		.log {
			margin-top: 10px;
			color: var(--muted);
			font-size: 0.92rem;
			min-height: 20px;
		}

		.app {
			display: none;
			margin-top: 12px;
		}

		.app.active {
			display: block;
		}

		teleop-ui {
			display: block;
			min-height: 68vh;
			width: 100%;
		}

		.helper {
			font-size: 0.9rem;
			color: var(--muted);
			margin-top: 6px;
			line-height: 1.5;
		}
	</style>
</head>

<body>
	<main>
		<div class="top-bar">
			<div class="brand">Reachy Mini Phone Teleop</div>
			<div class="status" aria-live="polite">
				<span class="status-dot disconnected" id="status-dot"></span>
				<span class="status-text" id="status-text">Disconnected</span>
			</div>
		</div>

		<div class="card">
			<div class="title">Hold to move Reachy</div>
			<p class="subtitle">Start the AR session, hold the button to drive motion. Status above turns green when the
				phone is connected.</p>

			<button class="start-button" id="start-button">Start Teleop</button>
			<p class="helper">Tip: keep this page open on your phone. The big hold button dominates the view when the
				session starts.</p>

			<div class="app" id="app">
				<teleop-ui id="teleop-ui"></teleop-ui>
			</div>

			<div class="log" id="log"></div>
		</div>
	</main>

	<script>
		class TeleopJoystick {
			constructor() {
				this.gripper = 'open';
				this.moveButtonPressed = false;
				this.reservedButtonA = false;
				this.reservedButtonB = false;
				this.scale = 1.0;
			}

			handleControllerInput(session, frame) {
				const inputSources = session.inputSources;
				for (let inputSource of inputSources) {
					if (inputSource.gamepad && inputSource.handedness === 'right') {
						const gamepad = inputSource.gamepad;
						this.moveButtonPressed = !!(gamepad.buttons[1] && gamepad.buttons[1].pressed);

						if (gamepad.buttons[0] && gamepad.buttons[0].pressed && !gamepad.buttons[0].wasPressed) {
							this.gripper = (this.gripper === 'open') ? 'close' : 'open';
						}
						gamepad.buttons[0].wasPressed = gamepad.buttons[0].pressed;

						this.reservedButtonA = !!(gamepad.buttons[4] && gamepad.buttons[4].pressed);
						this.reservedButtonB = !!(gamepad.buttons[5] && gamepad.buttons[5].pressed);

						const gamepadAxis = gamepad.axes[0];
						if (gamepadAxis !== undefined && Math.abs(gamepadAxis) > 0.1) {
							this.scale = Math.max(0.2, Math.min(1.0, this.scale + gamepadAxis * 0.1));
						}
					}
				}
			}

			isMotionEnabled() {
				return this.moveButtonPressed;
			}

			isGripperEngaged() {
				return this.gripper === 'close';
			}

			isReservedButtonAActive() {
				return this.reservedButtonA;
			}

			isReservedButtonBActive() {
				return this.reservedButtonB;
			}

			getScale() {
				return this.scale;
			}
		}

		const teleopUI = document.querySelector('#teleop-ui');
		const teleopJoystick = new TeleopJoystick();
		const startButtonDom = document.querySelector('#start-button');
		const appDom = document.querySelector('#app');
		const statusDot = document.querySelector('#status-dot');
		const statusText = document.querySelector('#status-text');
		const logDom = document.querySelector('#log');
		const antennaHud = document.createElement('div');
		antennaHud.style.color = 'var(--muted)';
		antennaHud.style.fontSize = '0.9rem';
		antennaHud.style.marginTop = '8px';
		antennaHud.textContent = 'Antennas L 0.00 • R 0.00';
		document.querySelector('.card').appendChild(antennaHud);
		let resetButtonInjected = false;
		let motionTouchHandlersAttached = false;
		const antennaTargets = { left: 0, right: 0 };
		const antennaTouches = { left: null, right: null };
		const maxAntennaRad = 3.0;
		const pixelsPerRad = 180;

		const setStatus = (state, label) => {
			statusDot.classList.toggle('connected', state === 'connected');
			statusDot.classList.toggle('disconnected', state !== 'connected');
			statusText.textContent = label;
		};

		const setMessage = (msg) => {
			console.log(msg);
			logDom.textContent = msg;
		}

		const customizeTeleopUI = () => {
			customElements.whenDefined('teleop-ui').then(() => {
				const shadow = teleopUI.shadowRoot;
				if (!shadow) return;

				// Hide info + extra controls to free room for the hold button
				const info = shadow.querySelector('.info-section');
				const aux = shadow.querySelector('.auxilary-section');
				if (info) info.style.display = 'none';
				if (aux) aux.style.display = 'none';

				// Remove gripper button
				const gripperButton = shadow.getElementById('gripperButton');
				if (gripperButton) {
					gripperButton.remove();
				}

				const controls = shadow.querySelector('.controls');
				const motionButton = shadow.getElementById('motionButton');

				if (controls) {
					controls.style.height = '100%';
					controls.style.flexDirection = 'column';
					controls.style.alignItems = 'stretch';
				}

				if (controls && motionButton && !resetButtonInjected) {
					const resetButton = document.createElement('button');
					resetButton.className = 'control-button motion-button';
					resetButton.textContent = 'Reset pose';
					resetButton.style.background = '#d8e9ff';
					resetButton.style.color = '#0b1624';
					resetButton.style.minHeight = '72px';
					resetButton.style.fontWeight = '800';
					resetButton.style.borderRadius = '12px';
					resetButton.style.marginBottom = '12px';
					resetButton.addEventListener('click', async () => {
						try {
							const res = await fetch('/reset', { method: 'POST' });
							if (!res.ok) throw new Error('Reset failed');
							antennaTargets.left = 0;
							antennaTargets.right = 0;
							antennaHud.textContent = 'Antennas L 0.00 • R 0.00';
							teleopUI.updateLocalStats({
								position: { x: 0, y: 0, z: 0 },
								orientation: { x: 0, y: 0, z: 0, w: 1 },
								fps: fps
							});
							setMessage('Pose reset to home');
						} catch (err) {
							console.error(err);
							setMessage('Reset failed');
						}
					});
					controls.insertBefore(resetButton, motionButton);
					resetButtonInjected = true;
				}

				if (motionButton) {
					motionButton.textContent = 'Hold to move, slide left and right thumbs to adjust antennas';
					motionButton.style.minHeight = '55vh';
					motionButton.style.fontSize = '22px';
					motionButton.style.borderRadius = '18px';
					motionButton.style.touchAction = 'none';

					if (!motionTouchHandlersAttached) {
						const clearAntennaTouch = (side) => {
							antennaTouches[side] = null;
						};

						const assignTouchSide = (touch, rect) => {
							const isLeft = touch.clientX < rect.left + rect.width / 2;
							return isLeft ? "left" : "right";
						};

						const handleTouchStart = (event) => {
							event.preventDefault();
							const rect = motionButton.getBoundingClientRect();
							for (const touch of event.changedTouches) {
								const side = assignTouchSide(touch, rect);
								const otherSide = side === "left" ? "right" : "left";
								const base = antennaTargets[side] ?? 0;
								if (!antennaTouches[side]) {
									antennaTouches[side] = { id: touch.identifier, startY: touch.clientY, base };
								} else if (!antennaTouches[otherSide]) {
									const baseOther = antennaTargets[otherSide] ?? 0;
									antennaTouches[otherSide] = { id: touch.identifier, startY: touch.clientY, base: baseOther };
								} else {
									antennaTouches[side] = { id: touch.identifier, startY: touch.clientY, base };
								}
							}
						};

						const handleTouchMove = (event) => {
							event.preventDefault();
							const rect = motionButton.getBoundingClientRect();
							for (const touch of event.changedTouches) {
								let side = null;
								if (antennaTouches.left?.id === touch.identifier) side = "left";
								if (antennaTouches.right?.id === touch.identifier) side = "right";
								if (!side) {
									side = assignTouchSide(touch, rect);
									const base = antennaTargets[side] ?? 0;
									antennaTouches[side] = { id: touch.identifier, startY: touch.clientY, base };
								}
								const anchor = antennaTouches[side];
								if (!anchor) continue;

								const delta = (anchor.startY - touch.clientY) / pixelsPerRad;
								const clamped = Math.max(-maxAntennaRad, Math.min(maxAntennaRad, anchor.base + delta));
								antennaTargets[side] = clamped;
							}
						};

						const handleTouchEnd = (event) => {
							for (const touch of event.changedTouches) {
								if (antennaTouches.left?.id === touch.identifier) {
									clearAntennaTouch("left");
								}
								if (antennaTouches.right?.id === touch.identifier) {
									clearAntennaTouch("right");
								}
							}
						};

						motionButton.addEventListener('touchstart', handleTouchStart, { passive: false });
						motionButton.addEventListener('touchmove', handleTouchMove, { passive: false });
						document.addEventListener('touchend', handleTouchEnd);
						document.addEventListener('touchcancel', handleTouchEnd);
						motionTouchHandlersAttached = true;
					}
				}
			});
		};

		customizeTeleopUI();

		// FPS Counter
		let fps = 0;
		let frameCount = 0;
		let lastFpsTime = performance.now();

		function updateFPS() {
			frameCount++;
			const currentTime = performance.now();
			if (currentTime - lastFpsTime >= 1000) { // Update every second
				fps = Math.round((frameCount * 1000) / (currentTime - lastFpsTime));
				frameCount = 0;
				lastFpsTime = currentTime;
			}
		}

		// WebSocket connection
		const serverStats = {
			connection: 'Not connected',
		};
		teleopUI.updateServerDiagnostics(serverStats);
		const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
		const wsUrl = `${protocol}//${window.location.host}/ws`;
		let socket;
		let isConnected = false;

		function connectWebSocket() {
			setStatus('disconnected', 'Connecting...');
			socket = new WebSocket(wsUrl);

			socket.onopen = () => {
				isConnected = true;
				setStatus('connected', 'Connected');
				serverStats.connection = 'Connected';
				teleopUI.updateServerDiagnostics(serverStats);
			};

			socket.onclose = () => {
				isConnected = false;
				setStatus('disconnected', 'Disconnected');
				serverStats.connection = 'Disconnected';
				teleopUI.updateServerDiagnostics(serverStats);

				setTimeout(connectWebSocket, 3000);
			};

			socket.onerror = (error) => {
				serverStats.connection = 'Error';
				teleopUI.updateServerDiagnostics(serverStats);
				setStatus('disconnected', 'Connection error');
				console.error('WebSocket error:', error);
			};

			socket.onmessage = (event) => {
				const message = JSON.parse(event.data);
				console.log('Received message:', message);
			};
		}

		// Connect on page load
		connectWebSocket();

		const sendPose = (pose) => {
			if (isConnected && socket.readyState === WebSocket.OPEN) {
				socket.send(JSON.stringify({
					type: 'pose',
					data: pose
				}));
			} else {
				console.error('WebSocket not connected, cannot send pose');
			}
		}

		let isVRDevice = false;

		function detectDeviceType(session) {
			const inputSources = session.inputSources;
			for (let inputSource of inputSources) {
				if (inputSource.handedness === 'right' && inputSource.targetRayMode === 'tracked-pointer') {
					return true;
				}
			}
			return false;
		}

		function getPoseFromInputSource(session, frame, referenceSpace) {
			const inputSources = session.inputSources;
			for (let inputSource of inputSources) {
				if (inputSource.handedness === 'right' && inputSource.targetRayMode === 'tracked-pointer') {
					const pose = frame.getPose(inputSource.targetRaySpace, referenceSpace);
					if (pose) {
						return {
							position: pose.transform.position,
							orientation: pose.transform.orientation
						};
					}
				}
			}
			return null;
		}

		setMessage('Click the button to start WebXR');
		let lastSendTime = performance.now();
		startButtonDom.addEventListener('click', () => {
			if (navigator.xr) {
				navigator.xr.requestSession('immersive-ar', {
					requiredFeatures: ['local-floor'],
					optionalFeatures: ['hand-tracking', 'unbounded', 'dom-overlay', 'dom-overlay-for-handheld-ar', 'hit-test', 'high-fixed-foveation-level'],
					domOverlay: { root: document.querySelector('#app') }
				}).then((session) => {
					teleopUI.addEventListener('exit', () => {
						session.end()
					});

					session.addEventListener('end', () => {
						appDom.classList.remove('active');
						setMessage('Click the button to start WebXR');
					});

					session.addEventListener('inputsourceschange', () => {
						isVRDevice = detectDeviceType(session);
						setMessage(isVRDevice ? 'VR controllers detected' : 'Using device pose');
					});

					appDom.classList.add('active');

					const glCanvas = document.createElement('canvas');
					const gl = glCanvas.getContext('webgl', {
						xrCompatible: true,
						antialias: false,
						alpha: false,
						depth: false,
						stencil: false,
						preserveDrawingBuffer: false,
						powerPreference: "high-performance"
					});
					session.updateRenderState({
						baseLayer: new XRWebGLLayer(session, gl, {
							antialias: false,
							depth: false,
							stencil: false,
							alpha: false,
							multiview: false
						})
					});

					session.requestReferenceSpace('local-floor').then((referenceSpace) => {
						let xrReferenceSpace = referenceSpace;

						function onXRFrame(time, frame) {
							updateFPS();

							let position, orientation;

							if (isVRDevice) {
								teleopJoystick.handleControllerInput(session, frame);
								const controllerPose = getPoseFromInputSource(session, frame, xrReferenceSpace);
								if (controllerPose) {
									position = controllerPose.position;
									orientation = controllerPose.orientation;
								} else {
									const viewerPose = frame.getViewerPose(xrReferenceSpace);
									if (viewerPose && viewerPose.views[0]) {
										position = viewerPose.views[0].transform.position;
										orientation = viewerPose.views[0].transform.orientation;
									}
								}
							} else {
								const viewerPose = frame.getViewerPose(xrReferenceSpace);
								if (viewerPose && viewerPose.views[0]) {
									position = viewerPose.views[0].transform.position;
									orientation = viewerPose.views[0].transform.orientation;
								}
							}

							if (position && orientation) {
								if (time - lastSendTime > 10) {
									const teleopFrontEnd = (isVRDevice) ? teleopJoystick : teleopUI;
									lastSendTime = time;
									const state = {
										position: {
											x: position.x,
											y: position.y,
											z: position.z
										},
										orientation: {
											x: orientation.x,
											y: orientation.y,
											z: orientation.z,
											w: orientation.w
										},
										move: teleopFrontEnd.isMotionEnabled(),
										gripper: teleopFrontEnd.isGripperEngaged() ? 'close' : 'open',
										fps: fps,
										scale: teleopFrontEnd.getScale(),
										reservedButtonA: teleopFrontEnd.isReservedButtonAActive(),
										reservedButtonB: teleopFrontEnd.isReservedButtonBActive(),
										device: isVRDevice ? 'VR' : 'Phone',
										message: logDom.textContent
									}
									state.antennas = [antennaTargets.right, antennaTargets.left];
									sendPose(state);
									teleopUI.updateLocalStats(state);
									antennaHud.textContent = `Antennas L ${antennaTargets.left.toFixed(2)} • R ${antennaTargets.right.toFixed(2)}`;
								}
							} else {
								setMessage('No pose available');
							}
							session.requestAnimationFrame(onXRFrame);
						}
						session.requestAnimationFrame(onXRFrame);
					}).catch((err) => {
						setMessage('Failed to request reference space: ' + err);
					});
				}).catch((err) => {
					setMessage('Failed to start WebXR session: ' + err);
				});
			} else {
				setMessage('WebXR is not supported on this device');
			}
		});
	</script>
</body>

</html>
