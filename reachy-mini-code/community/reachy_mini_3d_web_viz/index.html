<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reachy Mini 3D Web Viz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Reachy Mini 3D Web Viz</h1>
        <p>A 3D web visualizer for Reachy Mini robot using Three.js</p>
        <img src="reachy-disco.png" alt="Reachy Mini" class="hero-image">
        <div class="features">
            <h2>Features</h2>
            <ul>
                <li>Real-time 3D visualization of Reachy Mini</li>
                <li>Live joint position updates via WebSocket</li>
                <li>Interactive camera controls</li>
                <li>URDF-based robot model</li>
            </ul>
        </div>
        <div class="install">
            <h2>Installation</h2>
            <code>pip install reachy-mini-3d-web-viz</code>
        </div>
    </div>
</body>
</html>
